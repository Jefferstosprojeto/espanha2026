<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#F0C040;--silver:#A8B5C8;--white:#F5F0E8;--bg:#080C14;--r:14px}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,12,20,.9);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Playfair Display',serif;font-size:14px;font-weight:700}
.logo em{color:var(--gold);font-style:italic}
.topdate{font-size:10px;color:var(--silver)}

/* COUNTDOWN BANNER */
.cd-banner{background:linear-gradient(135deg,#6B0808,#B22222 50%,#1A1A3C);padding:80px 20px 28px;text-align:center}
.cd-flag{font-size:44px;margin-bottom:14px}
.cd-title{font-family:'Playfair Display',serif;font-size:clamp(24px,7vw,38px);font-weight:900;line-height:1.2;margin-bottom:6px}
.cd-title em{color:var(--gold);font-style:italic}
.cd-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:20px}
.cd-timer{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.cd-unit{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 10px;min-width:64px;text-align:center}
.cd-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold);display:block}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;display:block;margin-top:2px}
.cd-note{font-size:11px;color:rgba(255,255,255,.45);margin-top:10px}

/* LIVE BANNER */
.live-banner{background:linear-gradient(135deg,#0A3C1A,#1A7A45);padding:76px 20px 20px;text-align:center}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(240,192,64,.2);border:1px solid rgba(240,192,64,.4);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--gold);margin-bottom:10px}
.live-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;margin-bottom:4px}
.live-sub{font-size:11px;color:rgba(255,255,255,.6)}

/* COMPLETE BANNER */
.done-banner{background:linear-gradient(135deg,#0D4A1E,#27AE60);padding:76px 20px 28px;text-align:center}
.done-trophy{font-size:56px;margin-bottom:12px}
.done-title{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,34px);font-weight:900;line-height:1.2;margin-bottom:8px}
.done-title em{color:var(--gold);font-style:italic}

/* DAY SELECTOR */
.day-selector{padding:16px 0 4px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07)}
.ds-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);padding:0 16px;margin-bottom:10px}
.ds-scroll{overflow-x:auto;scrollbar-width:none;padding:0 16px 4px}
.ds-scroll::-webkit-scrollbar{display:none}
.ds-inner{display:flex;gap:8px;min-width:max-content}
.ds-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;border:none;background:none;color:var(--white);font-family:'Inter',sans-serif}
.ds-circle{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .2s}
.ds-btn.active .ds-circle{background:var(--gold);border-color:var(--gold);transform:scale(1.12);box-shadow:0 0 16px rgba(240,192,64,.45)}
.ds-btn.today .ds-circle{border-color:var(--gold);box-shadow:0 0 10px rgba(240,192,64,.3)}
.ds-btn.past .ds-circle{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.3)}
.ds-name{font-size:8px;color:rgba(255,255,255,.4);max-width:48px;text-align:center;line-height:1.2}
.ds-btn.active .ds-name{color:var(--gold);font-weight:700}
.ds-sep{width:6px;height:2px;background:rgba(255,255,255,.08);align-self:center;flex-shrink:0}

/* DAY HERO */
.day-hero{position:relative;min-height:260px;display:flex;align-items:flex-end}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center}
.hero-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,20,.95) 0%,rgba(8,12,20,.3) 100%)}
.hero-text{position:relative;z-index:2;padding:18px 16px}
.hero-eyebrow{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5.5vw,30px);font-weight:900;line-height:1.25;margin-bottom:8px}
.hero-hotel{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;font-size:11px}

/* CONTENT SECTIONS */
.section{padding:16px}
.sec-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-hd::after{content:'';flex:1;height:1px;background:rgba(240,192,64,.2)}
.sec-hd.silver{color:var(--silver)}
.sec-hd.silver::after{background:rgba(168,181,200,.15)}

/* ACTIVITIES */
.acts{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:13px}
.act{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.act:last-child{border:none;padding-bottom:0}
.act-t{font-size:10px;color:var(--silver);min-width:38px;flex-shrink:0;margin-top:1px;font-weight:500}
.act-i{font-size:14px;flex-shrink:0}
.act-x{font-size:12.5px;line-height:1.4;color:rgba(255,255,255,.85)}
.act-x strong{color:var(--white)}

/* SCROLL STRIPS */
.xscroll{overflow-x:auto;scrollbar-width:none;padding:0 16px 4px}
.xscroll::-webkit-scrollbar{display:none}
.xinner{display:flex;gap:10px;min-width:max-content}

/* PHOTO CARDS */
.ph{width:150px;flex-shrink:0;border-radius:11px;overflow:hidden;position:relative}
.ph img{width:100%;height:110px;object-fit:cover;display:block;background:rgba(255,255,255,.05)}
.ph-cap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:5px 7px;font-size:10px;font-weight:600}

/* FOOD CARDS */
.fc{width:145px;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:11px;overflow:hidden}
.fc-img{width:100%;height:86px;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
.fc-em{width:100%;height:86px;display:flex;align-items:center;justify-content:center;font-size:36px}
.fc-body{padding:8px 9px}
.fc-name{font-size:11.5px;font-weight:700;margin-bottom:2px;line-height:1.2}
.fc-desc{font-size:9.5px;color:rgba(255,255,255,.5);line-height:1.3;margin-bottom:3px}
.fc-where{font-size:9px;color:var(--gold);font-weight:600}

.pb80{padding-bottom:80px}
</style>
</head>

// ═══ HELPERS ═══
function getDayIdx(){
  var now=new Date(); now.setHours(0,0,0,0);
  var s=new Date(TRIP_START); s.setHours(0,0,0,0);
  return Math.floor((now-s)/86400000);
}

function formatDate(str){
  return new Date(str+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}

// ═══ RENDER BANNER ═══
function renderBanner(){
  var idx=getDayIdx();
  var el=document.getElementById('banner');
  if(idx<0){
    // Countdown
    var diff=TRIP_START-new Date();
    var d=Math.floor(diff/86400000);
    var h=Math.floor((diff%86400000)/3600000);
    var m=Math.floor((diff%3600000)/60000);
    var s=Math.floor((diff%60000)/1000);
    el.innerHTML='<div class="cd-banner">'+
      '<div class="cd-flag">🇵🇹✈️🇪🇸</div>'+
      '<h1 class="cd-title">Família Santos<br><em>na Espanha!</em></h1>'+
      '<p class="cd-sub">A viagem começa em breve — explore já os 11 dias abaixo!</p>'+
      '<div class="cd-timer">'+
        '<div class="cd-unit"><span class="cd-num" id="cd-d">'+pad(d)+'</span><span class="cd-lbl">Dias</span></div>'+
        '<div class="cd-unit"><span class="cd-num" id="cd-h">'+pad(h)+'</span><span class="cd-lbl">Horas</span></div>'+
        '<div class="cd-unit"><span class="cd-num" id="cd-m">'+pad(m)+'</span><span class="cd-lbl">Min</span></div>'+
        '<div class="cd-unit"><span class="cd-num" id="cd-s">'+pad(s)+'</span><span class="cd-lbl">Seg</span></div>'+
      '</div>'+
      '<p class="cd-note">👇 Toque num dia abaixo para explorar!</p>'+
    '</div>';
  } else if(idx<DAYS.length){
    el.innerHTML='<div class="live-banner">'+
      '<div class="live-pill">🔴 AO VIVO</div>'+
      '<div class="live-title">DIA '+DAYS[idx].n+' de 11 — '+DAYS[idx].city+'</div>'+
      '<div class="live-sub">'+formatDate(DAYS[idx].date)+'</div>'+
    '</div>';
  } else {
    el.innerHTML='<div class="done-banner">'+
      '<div class="done-trophy">🏆</div>'+
      '<h1 class="done-title">Viagem<br><em>Concluída!</em></h1>'+
      '<p style="font-size:13px;color:rgba(255,255,255,.7);margin-top:8px">Jefferson, Ana e Arthur regressaram com memórias incríveis!</p>'+
    '</div>';
  }
}

function pad(n){return String(Math.floor(n)).padStart(2,'0');}

function tickCd(){
  var diff=TRIP_START-new Date();
  if(diff<=0){renderBanner();return;}
  var d=document.getElementById('cd-d');
  if(d){
    d.textContent=pad(diff/86400000);
    document.getElementById('cd-h').textContent=pad((diff%86400000)/3600000);
    document.getElementById('cd-m').textContent=pad((diff%3600000)/60000);
    document.getElementById('cd-s').textContent=pad((diff%60000)/1000);
  }
}

// ═══ RENDER DAY SELECTOR ═══
function renderSelector(){
  var idx=getDayIdx();
  var el=document.getElementById('ds');
  el.innerHTML='';
  DAYS.forEach(function(d,i){
    var cls='ds-btn';
    if(i===activeDay) cls+=' active';
    else if(i<idx) cls+=' past';
    else if(i===idx) cls+=' today';
    var btn=document.createElement('button');
    btn.className=cls;
    btn.innerHTML='<div class="ds-circle">'+d.em+'</div><div class="ds-name">'+d.city.replace('→','→<br>').split(',')[0]+'</div>';
    btn.dataset.idx=i;
    el.appendChild(btn);
    if(i<DAYS.length-1){
      var sep=document.createElement('div');
      sep.className='ds-sep';
      el.appendChild(sep);
    }
  });
  // Scroll active into view
  var active=el.querySelector('.ds-btn.active');
  if(active) setTimeout(function(){active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},100);
}

// ═══ RENDER DAY CONTENT ═══
function renderDay(i){
  var d=DAYS[i];
  var idx=getDayIdx();

  // Hero
  document.getElementById('d-bg').style.cssText='background:url(\''+d.hero+'\') center/cover no-repeat,'+d.grad+';';
  document.getElementById('d-eyebrow').textContent='DIA '+d.n+' DE 11 — '+formatDate(d.date);
  document.getElementById('d-title').textContent=d.title;
  document.getElementById('d-hotel').innerHTML='🏨 '+d.hotel;

  // Status badge
  var status='';
  if(i<idx) status='<span style="background:rgba(39,174,96,.2);color:#27AE60;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">✅ Já visitaram</span>';
  else if(i===idx) status='<span style="background:rgba(240,192,64,.2);color:var(--gold);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">📍 HOJE</span>';
  else status='<span style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">⏳ Em breve</span>';

  // Activities
  var acts='';
  d.acts.forEach(function(a){
    acts+='<div class="act"><span class="act-t">'+a.t+'</span><span class="act-i">'+a.i+'</span><span class="act-x">'+a.x+'</span></div>';
  });

  // Photos
  var photos='';
  d.photos.forEach(function(p){
    photos+='<div class="ph"><img src="'+p.u+'" alt="'+p.c+'" onerror="this.style.display=\'none\'"><div class="ph-cap">'+p.c+'</div></div>';
  });

  // Food
  var food='';
  d.food.forEach(function(f){
    var img=f.img?'<img class="fc-img" src="'+f.img+'" alt="'+f.n+'" onerror="this.style.display=\'none\'">':'';
    food+='<div class="fc">'+
      (f.img?img:'')+'<div class="fc-em">'+f.e+'</div>'+
      '<div class="fc-body"><div class="fc-name">'+f.n+'</div><div class="fc-desc">'+f.d+'</div><div class="fc-where">📍 '+f.w+'</div></div>'+
    '</div>';
  });

  document.getElementById('d-content').innerHTML=
    '<div class="section">'+status+'</div>'+
    '<div class="section"><div class="sec-hd">📅 PROGRAMA DO DIA</div><div class="acts">'+acts+'</div></div>'+
    '<div style="padding:0 0 4px"><div class="section" style="padding-bottom:8px"><div class="sec-hd silver">📸 O QUE VÃO VER</div></div><div class="xscroll"><div class="xinner">'+photos+'</div></div></div>'+
    '<div style="padding:16px 0 4px"><div class="section" style="padding-bottom:8px"><div class="sec-hd silver">🍽️ O QUE VÃO COMER</div></div><div class="xscroll" style="padding-bottom:20px"><div class="xinner">'+food+'</div></div></div>';
}

// ═══ INIT ═══
function init(){
  // Top bar date
  document.getElementById('top-dt').textContent=new Date().toLocaleString('pt-BR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  setInterval(function(){
    document.getElementById('top-dt').textContent=new Date().toLocaleString('pt-BR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  },30000);

  // Set active day
  var idx=getDayIdx();
  activeDay=Math.max(0,Math.min(idx,DAYS.length-1));

  // Render everything
  renderBanner();
  renderSelector();
  renderDay(activeDay);

  // Countdown tick
  if(idx<0) setInterval(tickCd,1000);

  // Day selector click — using event delegation (most reliable)
  document.getElementById('ds').addEventListener('click',function(e){
    var btn=e.target.closest('.ds-btn');
    if(!btn) return;
    var i=parseInt(btn.dataset.idx);
    if(isNaN(i)) return;
    activeDay=i;
    renderSelector();
    renderDay(i);
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

init();
</script>
